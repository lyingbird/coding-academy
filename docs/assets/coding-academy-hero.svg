<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="32" fill="#0A0F1F"/>
  <rect x="28" y="28" width="1144" height="664" rx="28" fill="url(#bg)"/>
  <circle cx="86" cy="86" r="8" fill="#FF6B6B"/>
  <circle cx="114" cy="86" r="8" fill="#FFD166"/>
  <circle cx="142" cy="86" r="8" fill="#06D6A0"/>
  <text x="88" y="156" fill="#F7FAFC" font-size="58" font-family="Consolas, 'Courier New', monospace" font-weight="700">Coding Academy</text>
  <text x="88" y="204" fill="#A0AEC0" font-size="24" font-family="Consolas, 'Courier New', monospace">A tiny sidecar buddy for Claude Code and other AI coding CLIs.</text>
  <text x="88" y="244" fill="#A0AEC0" font-size="24" font-family="Consolas, 'Courier New', monospace">You keep vibecoding. It scouts, fights, loots, and grows beside your terminal.</text>

  <rect x="88" y="300" width="640" height="316" rx="18" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <rect x="760" y="300" width="324" height="316" rx="18" fill="#08111D" stroke="#334155" stroke-width="2"/>

  <text x="116" y="342" fill="#93C5FD" font-size="24" font-family="Consolas, 'Courier New', monospace">claude</text>
  <text x="116" y="386" fill="#E2E8F0" font-size="24" font-family="Consolas, 'Courier New', monospace">&gt; /coding-academy</text>
  <text x="116" y="432" fill="#CBD5E1" font-size="22" font-family="Consolas, 'Courier New', monospace">Let's hatch your tiny coding buddy.</text>
  <text x="116" y="470" fill="#CBD5E1" font-size="22" font-family="Consolas, 'Courier New', monospace">Keep coding normally. It'll push maps on the side.</text>
  <text x="116" y="528" fill="#64748B" font-size="20" font-family="Consolas, 'Courier New', monospace">/coding-academy-check-in when you want the payoff.</text>

  <rect x="790" y="332" width="264" height="78" rx="14" fill="#0F172A" stroke="#22C55E" stroke-width="2"/>
  <text x="818" y="366" fill="#D1FAE5" font-size="18" font-family="Consolas, 'Courier New', monospace">Found a weak point.</text>
  <text x="818" y="392" fill="#86EFAC" font-size="16" font-family="Consolas, 'Courier New', monospace">Keep the rhythm. We're close.</text>

  <text x="828" y="480" fill="#A7F3D0" font-size="54" font-family="Consolas, 'Courier New', monospace">/\_/\</text>
  <text x="828" y="534" fill="#A7F3D0" font-size="54" font-family="Consolas, 'Courier New', monospace">( o.o )</text>
  <text x="828" y="588" fill="#A7F3D0" font-size="54" font-family="Consolas, 'Courier New', monospace">&gt; ^ &lt;</text>

  <text x="868" y="642" fill="#E2E8F0" font-size="24" font-family="Consolas, 'Courier New', monospace" font-weight="700">Tiny Hero</text>
  <text x="836" y="672" fill="#94A3B8" font-size="18" font-family="Consolas, 'Courier New', monospace">Lv.1 Debugger  •  World 1-1</text>

